<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>PWA</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='styles.css'>
    <script type="module" src='script.js'></script>
</head>

<body>
    <header>
        <h1>Quiz App</h1>
    </header>
    <div class="container">
        <main>
            <nav>
                <div id="card-container" class="card-container">
                    
                    <div class="card">
                        <p id="card-5">Server</p><img src="images/server.jpg" alt="Lando 5" class="sport">
                    </div>
                </div>
            </nav>

            <div id="app-root" class="QuizApp">

            </div>
        </main>

        <aside id="score-container" class="score">
            <h1>Score</h1>
        </aside>

    </div>

    <!-- Button zum Frage holen -->
    <button onclick="frageHolen()">Frage vom Server holen.</button>
    <div id="quiz-area">
        <h2 id="question-text">Hier erscheint die Frage...</h2>
        <div id="awnser-buttons"></div>
    </div>
</body>

</html>
